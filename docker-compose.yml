services:
  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      HOST: ${ORCHESTRATOR_HOST:-0.0.0.0}
      PORT: ${ORCHESTRATOR_PORT:-4000}
      TASK_STORE_PATH: ${TASK_STORE_PATH:-/data/tasks.json}
      COMMAND_TIMEOUT_MS: ${COMMAND_TIMEOUT_MS:-20000}
      MODEL_GATEWAY_TIMEOUT_MS: ${MODEL_GATEWAY_TIMEOUT_MS:-30000}
      MAX_TASK_COMMANDS: ${MAX_TASK_COMMANDS:-5}
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-1}
      ALLOWED_COMMAND_PREFIXES: ${ALLOWED_COMMAND_PREFIXES:-node,npm,echo,ls,pwd,cat}
      ALLOWED_WORKSPACE_ROOTS: ${ALLOWED_WORKSPACE_ROOTS:-/tmp,/app}
      DEFAULT_WORKING_DIRECTORY: ${DEFAULT_WORKING_DIRECTORY:-/tmp}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      AZURE_FOUNDRY_API_KEY: ${AZURE_FOUNDRY_API_KEY:-}
      AZURE_FOUNDRY_CHAT_URL: ${AZURE_FOUNDRY_CHAT_URL:-}
      AZURE_FOUNDRY_API_VERSION: ${AZURE_FOUNDRY_API_VERSION:-2024-05-01-preview}
      MODEL_CATALOG: ${MODEL_CATALOG:-}
      MODEL_PROVIDER_OVERRIDES: ${MODEL_PROVIDER_OVERRIDES:-}
      OPENAI_RESPONSES_URL: ${OPENAI_RESPONSES_URL:-https://api.openai.com/v1/responses}
      ANTHROPIC_MESSAGES_URL: ${ANTHROPIC_MESSAGES_URL:-https://api.anthropic.com/v1/messages}
      GOOGLE_API_BASE: ${GOOGLE_API_BASE:-https://generativelanguage.googleapis.com/v1beta/models}
      DEFAULT_MODELS: ${DEFAULT_MODELS:-gpt-4.1-mini,claude-sonnet,gemini-2.0-flash}
      ORCHESTRATOR_API_TOKEN: ${ORCHESTRATOR_API_TOKEN:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3100,http://127.0.0.1:3100,http://localhost:13100,http://127.0.0.1:13100}
      ALLOW_INSECURE_MARKETPLACE_HTTP: ${ALLOW_INSECURE_MARKETPLACE_HTTP:-false}
    volumes:
      - orchestrator_data:/data
    ports:
      - "${ORCHESTRATOR_HOST_PORT:-4000}:4000"
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s

  web:
    image: node:22-alpine
    working_dir: /app
    command: node server.js
    init: true
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      HOST: ${WEB_HOST:-0.0.0.0}
      PORT: ${WEB_PORT:-3000}
      ORCHESTRATOR_URL: ${ORCHESTRATOR_URL:-http://orchestrator:4000}
      ORCHESTRATOR_API_TOKEN: ${ORCHESTRATOR_API_TOKEN:-}
    volumes:
      - ./services/web:/app:ro
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:-}
    depends_on:
      web:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    profiles:
      - tunnel

volumes:
  orchestrator_data:
